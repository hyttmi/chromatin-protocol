# Docker Compose override for fast-sync benchmarks (reconciliation scaling).
# Mounts fast-sync configs with short sync intervals and no cooldown.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.fastsync.yml -p chromatindb up -d
#
# NOTE: Compose override replaces the entire volumes list for a service,
# so data volumes must be re-specified here.

services:
  node1:
    volumes:
      - node1-data:/data
      - ./configs/node1-fastsync.json:/config/node1.json:ro
  node2:
    volumes:
      - node2-data:/data
      - ./configs/node2-fastsync.json:/config/node2.json:ro
  node3:
    volumes:
      - node3-data:/data
      - ./configs/node3-fastsync.json:/config/node3.json:ro
