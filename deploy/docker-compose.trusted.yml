# Docker Compose override for trusted-mode benchmarks.
# Mounts trusted configs (with trusted_peers IPs) in place of default configs.
# Generated trusted configs contain runtime-resolved container IPs.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.trusted.yml -p chromatindb up -d
#
# NOTE: Compose override replaces the entire volumes list for a service,
# so data volumes must be re-specified here.

services:
  node1:
    volumes:
      - node1-data:/data
      - ./configs/node1-trusted.json:/config/node1.json:ro
  node2:
    volumes:
      - node2-data:/data
      - ./configs/node2-trusted.json:/config/node2.json:ro
  node3:
    volumes:
      - node3-data:/data
      - ./configs/node3-trusted.json:/config/node3.json:ro
