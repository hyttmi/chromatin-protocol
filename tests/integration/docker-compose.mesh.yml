services:
  node1:
    image: chromatindb:test
    container_name: chromatindb-test-node1
    command: ["run", "--config", "/config/node1-mesh.json", "--data-dir", "/data", "--log-level", "debug"]
    volumes:
      - node1-data:/data
      - ./configs/node1-mesh.json:/config/node1-mesh.json:ro
    networks:
      test-net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/4200 && exec 3>&-"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3

  node2:
    image: chromatindb:test
    container_name: chromatindb-test-node2
